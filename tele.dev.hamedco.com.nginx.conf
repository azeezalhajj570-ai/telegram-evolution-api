upstream mcp_tele {
    server 127.0.0.1:3011;
}

map $http_upgrade $connection_upgrade_mcp {
    default  upgrade;
    ''       close;
}

server {
    server_name tele.dev.hamedco.com;

    location /health {
        proxy_pass http://mcp_tele;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /sse {
        proxy_pass http://mcp_tele;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://mcp_tele;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade_mcp;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    listen 443 ssl;

    ssl_certificate /etc/letsencrypt/live/tele.dev.hamedco.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tele.dev.hamedco.com/privkey.pem;

    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    listen 80;
    server_name tele.dev.hamedco.com;
    return 301 https://$host$request_uri;
}
